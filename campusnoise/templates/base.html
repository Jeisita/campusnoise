<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CampusNoise</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        body {
            background-color: #fdf6f0;
        }

        .navbar-custom {
            background-color: #d8a7b1;
        }

        .btn-custom {
            background-color: #c38d9e;
            color: white;
            border: none;
        }

        .btn-custom:hover {
            background-color: #b57c8d;
            color: white;
        }

        .card {
            border: none;
            border-radius: 15px;
        }

    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-custom mb-4">

        <div class="container">

            <span class="navbar-brand text-white fw-bold">
                CampusNoise
            </span>

        </div>

    </nav>

    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
